<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketHub Event Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a href="index.html" class="logo">🎟 TicketHub</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#events">Events</a>
    <a href="index.html#tickets">My Tickets</a>
    <a href="account.html">Account</a>
  </nav>
</header>

<section class="event-page">
  <div id="eventPageContent"></div>
</section>

<script src="js/toast.js"></script>
<script src="js/events.js"></script>

<script src="js/seatmap/layouts.js"></script>
<script src="js/seatmap/generator.js"></script>
<script src="js/seatmap/renderer.js"></script>
<script src="js/seatmap/engine.js"></script>

<script>
const selectedTitle = localStorage.getItem("selectedEventTitle");
const eventData = events.find(event => event.title === selectedTitle);
const box = document.getElementById("eventPageContent");

function renderEventPage(){
  if(!eventData){
    box.innerHTML = `
      <div class="event-info-box">
        <h1>Event not found</h1>
        <p>Please return to the events page and choose an event again.</p>
        <a class="main-btn" href="index.html#events">Back to Events</a>
      </div>
    `;
    return;
  }

  const layout = SeatMapLayouts.getLayout(eventData);

  box.innerHTML = `
    <div class="event-layout pro-event-layout">

      <div>
        <img class="event-hero-img" src="${eventData.image}" alt="${eventData.title}">

        <div class="event-info-box">
          <span class="section-label">${eventData.category}</span>

          <h1>${eventData.title}</h1>

          <p>📍 ${eventData.location}</p>
          <p>📅 ${eventData.date}</p>
          <p>🏟 ${layout.title}</p>
          <p>${layout.description}</p>

          <div class="seatmap-stats">
            <div>
              <h3 id="seatTotal">0</h3>
              <p>Total seats</p>
            </div>

            <div>
              <h3 id="seatAvailable">0</h3>
              <p>Available</p>
            </div>

            <div>
              <h3 id="seatSold">0</h3>
              <p>Reserved</p>
            </div>
          </div>

          <div class="seat-summary-box">
            <h3>Selected seat</h3>

            <div id="selectedSeatBox">
              Choose an available seat on the map.
            </div>
          </div>

          <button class="buy-btn" onclick="SeatMapEngine.reserveSelectedSeat()">
            Reserve Selected Seat
          </button>
        </div>
      </div>

      <div class="seat-map-box pro-map-box">
        <span class="section-label">SeatMap V2</span>

        <h2>Choose your exact seat</h2>

        <div class="seat-legend">
          <span><b class="legend-vip"></b> VIP</span>
          <span><b class="legend-gold"></b> Gold</span>
          <span><b class="legend-standard"></b> Standard</span>
          <span><b class="legend-sold"></b> Sold</span>
          <span><b class="legend-selected"></b> Selected</span>
        </div>

        <div id="seatMapContainer"></div>
      </div>

    </div>
  `;

  SeatMapEngine.init(eventData, "seatMapContainer");
}

renderEventPage();
</script>

</body>
</html>
